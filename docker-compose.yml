  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U mes -d lzq_mes"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ---------- Redis (可选，看板缓存) ----------
  # redis:
  #   image: redis:7-alpine
  #   container_name: mes-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  rabbitmq_data:
  # postgres_data:
